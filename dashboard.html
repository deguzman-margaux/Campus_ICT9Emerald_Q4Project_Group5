<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body{
            background-color: #adadad;
            color: #333;
            margin-top: 80px;
        }
        
        .sidenav {
            height: 100%;
            width: 230px; /* Set the width of the sidebar */
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            padding-top: 50px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .sidenav a {
            padding: 15px 8px 6px 35px;
            text-decoration: none;
            font-size: 25px;
            color: #818181;
            display: block;
        }

        .sidenav a:hover {
            color: #f1f1f1;
        }

        .main {
            margin-left: 230px; /* Same as the width of the sidebar */
            padding: 0px 10px;
        
        }
  </style>
  
</head>
<body>

  <div class="sidenav">
        <img src="obmc.webp" alt="logo" height="150px" width="150px" class="rounded d-block mx-auto mb-3">
        <a href="dashboard.html">Dashboard</a>
        <a href="notebooks.html">Virtual Notebooks</a>
        <a href="tasks.html">Tasks</a>
        <a href="profile.html">Profile</a>
        <a href="index.html" onclick="return confirm('Are you sure you want to log out?');">Log out</a>
  </div>
  
  <div class="main">
    <div class="container">
      <h1 class="mb-4">School Dashboard</h1>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-3" id="activityTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="ongoing-tab" data-bs-toggle="tab" data-bs-target="#ongoing" type="button" role="tab">Ongoing</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="completed-tab" data-bs-toggle="tab" data-bs-target="#completed" type="button" role="tab">Completed</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="missed-tab" data-bs-toggle="tab" data-bs-target="#missed" type="button" role="tab">Missed</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="upcoming-tab" data-bs-toggle="tab" data-bs-target="#upcoming" type="button" role="tab">Upcoming</button>
        </li>
      </ul>

      <!-- Filters -->
      <div class="d-flex justify-content-between mb-3">
        <div>
          <select class="form-select d-inline w-auto">
            <option>2025–2026</option>
            <option>2024–2025</option>
          </select>
          <select class="form-select d-inline w-auto">
            <option>All</option>
            <option>Math</option>
            <option>Science</option>
          </select>
        </div>
        <div>
          <input type="text" class="form-control" placeholder="Search by activity title">
        </div>
      </div>

      <!-- Tab Content -->
      <div class="tab-content">
        <div class="tab-pane fade show active" id="ongoing" role="tabpanel">
          <table class="table table-striped table-bordered">
            <thead class="table-dark">
              <tr>
                <th>Class Name</th>
                <th>Teacher</th>
                <th>Activity Title</th>
                <th>Date</th>
                <th>Duration</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="6" class="text-center">No activities</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="tab-pane fade" id="completed" role="tabpanel">
          <p class="text-muted">No completed activities yet.</p>
        </div>
        <div class="tab-pane fade" id="missed" role="tabpanel">
          <p class="text-muted">No missed activities.</p>
        </div>
        <div class="tab-pane fade" id="upcoming" role="tabpanel">
          <p class="text-muted">No upcoming activities scheduled.</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
