<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background: radial-gradient(circle, #2d2d2d 0%, #121212 100%);
            color: #fff;
            background-image: url("obbackground.png");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;

            display: flex;
            justify-content: center; 
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .container {
            margin-top: 0 !important;
            display: flex;
            justify-content: center;
        }

        .main-card {
            padding: 25px;
            border-radius: 20px;
            width: 450px;
            max-width: 90vw;
            border: 2px solid #FFC107;
            background-color: #262626; 
            box-shadow: 0 0 30px rgba(255, 193, 7, 0.2);
        }

        .main-card img {
            height: auto;
            max-height: 15vh;
            width: auto;
            margin-bottom: 10px !important;
        }

        h2 {
            font-size: 1.5rem; /* Slightly smaller to save vertical space */
            text-align: center;
            color: #FFC107;
            font-weight: bold;
        }

        .form-label {
            color: #FFECB3;
        }

        .form-check-label {
            color: #b0b0b0;
        }

        .btn-primary {
            background-color: #FFC107 !important;
            border-color: #FFB300 !important;
            color: #000 !important;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #FFD54F !important;
        }

        .btn-outline-secondary {
            color: #FFC107 !important;
            border-color: #FFC107 !important;
        }

        .btn-outline-secondary:hover {
            background-color: #FFC107 !important;
            color: #000 !important;
        }

        a {
            color: #FFD54F !important;
        }

        #statusMessage {
            color: #FF6B6B;
            font-weight: bold;
        }
    </style>

</head>
<body>

    <div class="container w-100 mx-auto d-flex justify-content-center align-items-center">
        <div class="row">
            <div class="col-md-9">
                <div class="card main-card">
                    <img src="obmc.webp" alt="logo" height="150px" width="150px"class="rounded d-block mx-auto mb-3">
                    <h2>Login</h2>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" placeholder="Enter username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                        </div>
                        
                        <div class="form-check mb-3">
                            <input type="checkbox" class="form-check-input" id="stayLogged">
                            <label class="form-check-label" for="stayLogged">Stay logged in</label>
                            <div class="form-check-label" style="font-size: 0.75rem;">
                                Your session will stay active on this device.
                            </div>
                        </div>

                        <div id="statusMessage" class="text-center mb-3" style="color: #ff6b6b; font-weight: bold;"></div>
                    
                        <div class="d-grid gap-2">
                            <button type="button" onclick="authenticate()" class="btn btn-primary">Login</button>
                            <button type="reset" class="btn btn-outline-secondary">Cancel</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="https://www.w3schools.com" target="_blank" class="text-decoration-none small">Forgot username / password?</a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
            const correctUser = "sampleuser67"; 
            const correctPass = "password123";
            let attempts = 0
            const maxAttempts = 3

        function authenticate() {

            let inputUser = document.getElementById('username').value;
            let inputPass = document.getElementById('password').value;
            let statusDiv = document.getElementById('statusMessage');

            if (attempts >= maxAttempts){
                statusDiv.innerHTML = "Access Denied: Account locked.";
                return;
            }

            if (inputUser === correctUser && inputPass === correctPass) {
                window.alert("Welcome " + inputUser + "!");
                window.location.href = "dashboard.html";
            } else{
                attempts++;
                let remaining = maxAttempts - attempts;

                if (remaining > 0){
                    statusDiv.innerHTML = "Invalid login. " + remaining + " out of 3 left"
                } else{
                    statusDiv.innerHTML = "Access blocked. 0 out of 3 left";
                }
            }
        }
    </script>
    
</body>
</html>
