<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">

 <style>
 body {background-image: url("imgangeles.webp");}
 img {
  display: block;
  margin-left: auto;
  margin-right: auto;
  width: 50%; 
}
 </style>









</head>
<body>

<script>

 var attempts = 0;

function authenticate() {
     event.preventDefault(); 
    var username = document.getElementById('uname').value;
    var password = document.getElementById('pass').value;

    if (username === 'administrator01' && password === 'authenticate123') {
        alert('Welcome ' + username + "!");
        attempts = 0; 

        setTimeout(() => {
    }, 2000);

        window.location.href = "notebooks.html";
    } else { 
       
        attempts++; 
        
        if (attempts >= 3) {
            alert('Three attempts used. Try again later.');
        } else {
            alert('Wrong! You have used ' + attempts + ' attempts.');
        }
    } 
} 

</script>

<br>

   <div class="row g-12 m-12 justify-content-center">
        <div class="col-6 col-md-6 col-lg-6" class="divide">
            <div class=" p-3 border h-200 bg-opacity-75" style="background-color: rgba(255, 251, 237, 0.87);">
                <div class="container mt-3">
                    <div class="row align-items-stretch flex-nowrap">

                        

                        <div class="col-12 col-md-12">
                            <img src="obmc.webp" class="img-fluid" style="width: 100px;">
                            
                            <h2 class="center-text">Log-in to OBMC Website</h2>
                            <br>       
                            <form onsubmit="authenticate()">
                                
                                <div class="mb-3">
                                    <label for="uname">Username</label>
                                    <input type="text" class="form-control" id="uname" placeholder="Enter username"
                                        name="uname" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="pass">Password</label>
                                    <input type="text" class="form-control" id="pass" placeholder="Enter password"
                                        name="pass" required>

                                        <br> <br>
                                    <div class="form-check mb-3">
                                    <input type="checkbox" class="form-check-input" id="agree" name="agree"
                                        value="checked">
                                    <label class="form-check-label" for="agree">Remember my password</label>
                                </div>


                                    <br>

                                <div class="text-center">
                                     <input type="submit" class="btn btn-success" value="           Login           ">
                                     <input type="reset" class="btn btn-warning" value="           Cancel          ">
                                </div>
                               
                                <br>
                                <p> <a href="https://obmontessorilaspinas.orangeapps.ph/oa_school/home"> Forgot username / password? <a> </p>
                             
                                </div>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
    </div>
</main>

  
</body>
</html>
